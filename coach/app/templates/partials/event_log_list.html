<div id="today-log-list">
{% if logs %}
  {% for log in logs %}
  <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
    <span style="font-size:11px;color:var(--text-muted);min-width:42px;padding-top:2px;">
      {{ log.logged_at.strftime('%H:%M') }}
    </span>
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ log.event_title }}</div>
      {% if log.notes %}<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">{{ log.notes }}</div>{% endif %}
    </div>
    <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;flex-shrink:0;
      {% if log.action == 'done' %}background:#dcfce7;color:#15803d;
      {% elif log.action == 'skipped' %}background:#fef3c7;color:#b45309;
      {% elif log.action == 'snoozed' %}background:#e0e7ff;color:#4338ca;
      {% elif log.action == 'postponed' %}background:#fce7f3;color:#be185d;
      {% else %}background:#f1f5f9;color:#475569;{% endif %}">
      {{ log.action }}
    </span>
  </div>
  {% endfor %}
{% else %}
  <div style="font-size:12px;color:var(--text-muted);padding:8px 0;">No events logged today yet.</div>
{% endif %}
</div>
