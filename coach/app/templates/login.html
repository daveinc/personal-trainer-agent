<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach · Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 40px; width: 360px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-title span { color: #2563eb; }
    .login-sub { color: #64748b; margin-bottom: 28px; font-size: 13px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #2563eb; }
    .btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">Coach<span>.</span></div>
    <div style="font-size:18px;font-weight:600;color:#1e293b;margin-bottom:6px;">Become who you're meant to be.</div>
    <div class="login-sub">Who are you?</div>
    <form method="post" action="{{ root }}/auth/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="enter your name" autocomplete="off" autofocus required
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.form.submit();}">
      </div>
      <button class="btn" type="submit">Continue</button>
    </form>
  </div>
</div>
</body>
</html>
