{% extends "base.html" %}
{% set active = "calendar_admin" %}
{% block title %}Coach · Edit Event{% endblock %}
{% block page_title %}Edit Event{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;">
  <div class="card-title" style="margin-bottom:16px;">{{ event.get("summary", "Event") }}</div>
  <form method="post" action="{{ root }}/ui/admin/calendar/edit">
    <input type="hidden" name="uid" value="{{ uid }}">
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">Title</label>
      <input class="form-input" type="text" name="title" value="{{ event.get('summary', '') }}" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" name="date" value="{{ start_date }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input class="form-input" type="time" name="start_time" value="{{ start_time }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Duration (min)</label>
        <input class="form-input" type="number" name="duration" value="{{ duration }}" min="5" max="480">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label class="form-label">Description (raw)</label>
      <textarea class="form-input" name="description" rows="3"
                style="resize:vertical;">{{ event.get("description", "") }}</textarea>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary" type="submit">Save</button>
      <a href="{{ root }}/ui/admin/calendar" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
