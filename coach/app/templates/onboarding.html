<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach · Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 40px; width: 100%; max-width: 680px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .title span { color: #2563eb; }
    .sub { color: #64748b; margin-bottom: 28px; font-size: 13px; }
    .step-indicator { display: flex; gap: 8px; margin-bottom: 28px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
    .step-dot.active { background: #2563eb; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    input[type=text], input[type=time] { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; background: white; }
    input[type=text]:focus, input[type=time]:focus { border-color: #2563eb; }
    .btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #1d4ed8; }
    .btn-full { width: 100%; }

    /* Category table */
    .cat-table { width: 100%; border-collapse: collapse; }
    .cat-table th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; padding: 8px 10px; border-bottom: 2px solid #e2e8f0; }
    .cat-table td { padding: 10px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
    .cat-table tr:last-child td { border-bottom: none; }
    .cat-name { font-weight: 600; font-size: 13px; }
    .type-options { display: flex; gap: 16px; }
    .type-options label { display: flex; align-items: center; gap: 5px; font-weight: 400; cursor: pointer; margin-bottom: 0; white-space: nowrap; }
    .schedule-fields { margin-top: 10px; display: none; }
    .schedule-fields.visible { display: block; }
    .days-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .day-label { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 400; cursor: pointer; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; padding: 3px 8px; margin-bottom: 0; }
    .day-label input { width: auto; padding: 0; border: none; accent-color: #2563eb; }
    .day-label input:checked + span { color: #2563eb; font-weight: 600; }
    .time-row { display: flex; gap: 12px; align-items: center; }
    .time-row input { width: 120px; }
    .time-row span { color: #64748b; font-size: 12px; }
    .free-note { font-size: 12px; color: #64748b; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">Coach<span>.</span></div>

    {% if step == 1 %}
    <div class="sub">Let's get you set up. First, what should we call you?</div>
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <form method="post" action="{{ root }}/ui/onboarding/name">
      <div class="form-group">
        <label for="display_name">Your name</label>
        <input type="text" id="display_name" name="display_name"
               value="{{ user.display_name or '' }}"
               placeholder="e.g. Dave" autofocus required>
      </div>
      <button class="btn btn-full" type="submit">Next →</button>
    </form>

    {% else %}
    <div class="sub">Hi {{ user.display_name }}! Which areas do you want to track? You can set up the details in My Schedule after.</div>
    <div class="step-indicator">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
    </div>
    <form method="post" action="{{ root }}/ui/onboarding/categories">
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
        {% for slug, label in categories %}
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
          <input type="checkbox" name="categories" value="{{ slug }}" style="width:auto;padding:0;border:none;accent-color:#2563eb;width:16px;height:16px;">
          {{ label }}
        </label>
        {% endfor %}
      </div>
      <button class="btn btn-full" type="submit">Start →</button>
    </form>
    {% endif %}

  </div>
</div>
<script>
function onTypeChange(slug, type) {
  const sched = document.getElementById('sched_' + slug);
  const freenote = document.getElementById('freenote_' + slug);
  sched.classList.toggle('visible', type !== 'skip');
  if (freenote) freenote.style.display = (type === 'free') ? 'block' : 'none';
}
</script>
</body>
</html>
