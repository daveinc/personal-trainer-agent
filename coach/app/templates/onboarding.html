<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach · Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; font-size: 14px; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 40px; width: 100%; max-width: 560px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .title span { color: #2563eb; }
    .sub { color: #64748b; margin-bottom: 28px; font-size: 13px; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin: 24px 0 12px; }
    .form-group { margin-bottom: 16px; }
    label.field-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    input[type=text] { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; background: white; }
    input[type=text]:focus { border-color: #2563eb; }
    .unit-row { display: flex; gap: 10px; }
    .unit-opt { flex: 1; }
    .unit-opt input[type=radio] { display: none; }
    .unit-opt label { display: block; text-align: center; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .unit-opt input[type=radio]:checked + label { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .cat-opt input[type=checkbox] { display: none; }
    .cat-opt label { display: block; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .cat-opt input[type=checkbox]:checked + label { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
    .btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">Coach<span>.</span></div>
    <div class="sub">Let's get you set up.</div>

    <form method="post" action="{{ root }}/ui/onboarding/save">

      <div class="section-label">Your name</div>
      <div class="form-group">
        <input type="text" name="display_name" value="{{ user.display_name or '' }}"
               placeholder="e.g. Dave" autofocus required id="name-input">
      </div>

      <hr class="divider">

      <div class="section-label">Distance units</div>
      <div class="unit-row" style="margin-bottom:8px;">
        <div class="unit-opt">
          <input type="radio" name="unit_distance" value="km" id="u-km" checked>
          <label for="u-km">km</label>
        </div>
        <div class="unit-opt">
          <input type="radio" name="unit_distance" value="mi" id="u-mi">
          <label for="u-mi">mi</label>
        </div>
      </div>

      <hr class="divider">

      <div class="section-label">Currency symbol</div>
      <div class="form-group">
        <input type="text" name="currency" value="$" placeholder="$ € £ ₪ …"
               list="currency-list" style="max-width:120px;" maxlength="8">
        <datalist id="currency-list">
          <option value="$"><option value="€"><option value="£">
          <option value="₪"><option value="¥"><option value="₹">
        </datalist>
      </div>

      <hr class="divider">

      <div class="section-label">Week starts on</div>
      <div class="unit-row" style="margin-bottom:8px;">
        <div class="unit-opt">
          <input type="radio" name="week_start" value="Sun" id="w-sun">
          <label for="w-sun">Sunday</label>
        </div>
        <div class="unit-opt">
          <input type="radio" name="week_start" value="Mon" id="w-mon" checked>
          <label for="w-mon">Monday</label>
        </div>
      </div>

      <hr class="divider">

      <div class="section-label">Areas to track</div>
      <div class="cat-grid">
        {% for slug, label in categories %}
        <div class="cat-opt">
          <input type="checkbox" name="categories" value="{{ slug }}" id="cat-{{ slug }}">
          <label for="cat-{{ slug }}">{{ label }}</label>
        </div>
        {% endfor %}
      </div>

      <button class="btn" type="submit" id="save-btn" disabled>Save &amp; Start →</button>
    </form>
  </div>
</div>
<script>
  const nameInput = document.getElementById('name-input');
  const saveBtn = document.getElementById('save-btn');
  nameInput.addEventListener('input', () => {
    saveBtn.disabled = nameInput.value.trim() === '';
  });
  if (nameInput.value.trim()) saveBtn.disabled = false;
</script>
</body>
</html>
