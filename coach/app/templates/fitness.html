{% extends "base.html" %}
{% set active = "fitness" %}
{% block title %}Coach · Fitness{% endblock %}
{% block page_title %}Fitness{% endblock %}

{% block content %}
<div id="steps-widget"
     hx-get="{{ root }}/ui/fitness/steps"
     hx-trigger="load"
     hx-swap="innerHTML"
     style="margin-bottom:16px;">
</div>

<div class="grid grid-2">
  <div class="card" style="grid-column: 1 / -1;">
    <div class="flex justify-between items-center" style="margin-bottom:16px;">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this, '{{ root }}/ui/fitness/today')">Today</button>
        <button class="tab" onclick="switchTab(this, '{{ root }}/ui/fitness/week')">This Week</button>
        <button class="tab" onclick="switchTab(this, '{{ root }}/ui/fitness/month')">This Month</button>
      </div>
    </div>
    <div id="fitness-content"
         hx-get="{{ root }}/ui/fitness/today"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-title" style="margin-bottom:16px;">Schedule a Workout</div>
    <form hx-post="{{ root }}/ui/fitness/schedule"
          hx-target="#fitness-content"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful){this.reset();document.getElementById('sched-date').valueAsDate=new Date();document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab')[0].classList.add('active');}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Workout</label>
          <input class="form-input" type="text" name="title" placeholder="e.g. Morning Run" required>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" name="date" id="sched-date" required>
        </div>
        <div class="form-group">
          <label class="form-label">Start Time</label>
          <input class="form-input" type="time" name="start_time" required>
        </div>
        <div class="form-group">
          <label class="form-label">Duration (min)</label>
          <input class="form-input" type="number" name="duration" value="60" min="5" max="480">
        </div>
      </div>
      <button class="btn btn-primary" type="submit">Add to Calendar</button>
    </form>
  </div>
</div>

<script>
document.getElementById('sched-date').valueAsDate = new Date();

function switchTab(btn, url) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  htmx.ajax('GET', url, {target: '#fitness-content', swap: 'innerHTML'});
}
</script>
{% endblock %}
